<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生命的意义 — 多维度交互式探索</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg-deep: #0a0e14;
  --bg-panel: #131820;
  --bg-card: #1a1f2e;
  --bg-hover: #222840;
  --text-primary: #e0e0e0;
  --text-secondary: #8899aa;
  --text-muted: #556677;
  --gold: #d4a853;
  --gold-light: #e8c97a;
  --gold-dim: #8b6f3a;
  --blue: #5a8db6;
  --blue-dim: #3a5f7a;
  --red: #c05757;
  --red-dim: #7a3a3a;
  --green: #5a9e6f;
  --green-dim: #3a6f4a;
  --purple: #8b6faa;
  --purple-dim: #5a3a7a;
  --orange: #c0854a;
  --orange-dim: #7a5530;
  --teal: #4a9e9e;
  --teal-dim: #306a6a;
  --pink: #b85a8a;
  --pink-dim: #7a3a5a;
  --radius: 8px;
  --radius-lg: 14px;
  --transition: 0.25s ease;
  --font-serif: 'Noto Serif SC', 'SimSun', serif;
  --font-sans: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; scroll-behavior:smooth; }
body {
  font-family:var(--font-sans);
  background:var(--bg-deep);
  color:var(--text-primary);
  line-height:1.7;
  min-height:100vh;
  overflow-x:hidden;
}
a { color:var(--gold); text-decoration:none; transition:var(--transition); }
a:hover { color:var(--gold-light); }

/* Layout */
.app-header {
  position:sticky; top:0; z-index:100;
  background:var(--bg-deep); border-bottom:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  padding:0 24px; height:56px;
  display:flex; align-items:center; justify-content:space-between;
}
.app-header .logo {
  font-family:var(--font-serif);
  font-size:1.25rem; font-weight:700;
  color:var(--gold); cursor:pointer;
  letter-spacing:0.05em;
}
.app-header nav { display:flex; gap:20px; align-items:center; }
.app-header nav a {
  font-size:0.875rem; color:var(--text-secondary);
  padding:6px 0; position:relative;
  white-space:nowrap;
}
.app-header nav a:hover, .app-header nav a.active { color:var(--gold); }
.app-header nav a.active::after {
  content:''; position:absolute; bottom:-1px; left:0; right:0;
  height:2px; background:var(--gold); border-radius:1px;
}
.search-trigger {
  background:var(--bg-card); border:1px solid rgba(255,255,255,0.08);
  color:var(--text-secondary); padding:6px 14px; border-radius:20px;
  font-size:0.8rem; cursor:pointer; transition:var(--transition);
  display:flex; align-items:center; gap:6px;
}
.search-trigger:hover { border-color:var(--gold-dim); color:var(--text-primary); }
.search-trigger kbd {
  background:var(--bg-hover); padding:1px 6px; border-radius:3px;
  font-size:0.7rem; font-family:inherit;
}

main { max-width:1200px; margin:0 auto; padding:24px; min-height:calc(100vh - 56px); }

/* Sections */
.page { display:none; }
.page.active { display:block; animation:fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* Hero */
.hero {
  text-align:center; padding:80px 20px 60px;
  position:relative;
}
.hero h1 {
  font-family:var(--font-serif);
  font-size:2.8rem; font-weight:700;
  color:var(--gold); margin-bottom:16px;
  letter-spacing:0.08em;
}
.hero .subtitle {
  font-size:1.1rem; color:var(--text-secondary);
  max-width:520px; margin:0 auto 32px;
  font-weight:300;
}
.hero .cta-row { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }

.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:10px 22px; border-radius:24px; font-size:0.9rem;
  cursor:pointer; transition:var(--transition);
  border:none; font-family:inherit;
}
.btn-primary { background:var(--gold); color:#1a1a1a; font-weight:600; }
.btn-primary:hover { background:var(--gold-light); transform:translateY(-1px); }
.btn-outline {
  background:transparent; color:var(--gold);
  border:1px solid var(--gold-dim);
}
.btn-outline:hover { border-color:var(--gold); background:rgba(212,168,83,0.06); }
.btn-sm { padding:5px 14px; font-size:0.8rem; }
.btn-icon { width:36px; height:36px; padding:0; justify-content:center; border-radius:50%; }

/* Dimension nav */
.dim-nav {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
  gap:12px; margin-top:40px;
}
.dim-card {
  background:var(--bg-card); border-radius:var(--radius-lg);
  padding:22px 16px; text-align:center; cursor:pointer;
  transition:var(--transition); border:1px solid transparent;
}
.dim-card:hover { border-color:var(--gold-dim); transform:translateY(-2px); background:var(--bg-hover); }
.dim-card .dim-icon { font-size:2rem; margin-bottom:8px; }
.dim-card .dim-name { font-size:0.9rem; font-weight:500; color:var(--text-primary); }
.dim-card .dim-count { font-size:0.75rem; color:var(--text-muted); margin-top:3px; }

/* Section titles */
.section-title {
  font-family:var(--font-serif);
  font-size:1.6rem; color:var(--gold); margin-bottom:24px;
  padding-bottom:12px; border-bottom:1px solid rgba(255,255,255,0.06);
}

/* Quote cards */
.quote-controls { display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; align-items:center; }
.filter-chips { display:flex; gap:8px; flex-wrap:wrap; }
.chip {
  padding:5px 14px; border-radius:16px; font-size:0.8rem;
  cursor:pointer; transition:var(--transition);
  background:var(--bg-card); color:var(--text-secondary);
  border:1px solid rgba(255,255,255,0.06);
}
.chip:hover, .chip.active { background:var(--gold-dim); color:var(--gold-light); border-color:var(--gold-dim); }
.search-input {
  background:var(--bg-card); border:1px solid rgba(255,255,255,0.08);
  color:var(--text-primary); padding:8px 16px; border-radius:20px;
  font-size:0.85rem; font-family:inherit; min-width:200px; outline:none;
  transition:var(--transition);
}
.search-input:focus { border-color:var(--gold-dim); }
.search-input::placeholder { color:var(--text-muted); }

.quote-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));
  gap:16px;
}
.quote-card {
  background:var(--bg-card); border-radius:var(--radius-lg);
  padding:24px; position:relative;
  border:1px solid rgba(255,255,255,0.04);
  transition:var(--transition);
}
.quote-card:hover { border-color:rgba(255,255,255,0.1); }
.quote-card .quote-text {
  font-family:var(--font-serif);
  font-size:1.05rem; line-height:1.8; color:var(--text-primary);
  margin-bottom:12px; quotes:"\201C""\201D";
}
.quote-card .quote-text::before { content:open-quote; color:var(--gold-dim); font-size:1.8rem; line-height:0; vertical-align:-0.3em; margin-right:4px; }
.quote-card .quote-translation {
  font-size:0.85rem; color:var(--text-secondary); margin-bottom:12px;
  font-style:italic; padding-left:12px; border-left:2px solid var(--gold-dim);
}
.quote-card .quote-meta { font-size:0.8rem; color:var(--text-muted); }
.quote-card .quote-meta strong { color:var(--text-secondary); }
.quote-card .quote-dim {
  display:inline-block; padding:2px 10px; border-radius:10px;
  font-size:0.7rem; margin-top:8px;
  background:rgba(212,168,83,0.12); color:var(--gold-light);
}
.quote-card .quote-actions {
  position:absolute; top:12px; right:12px; display:flex; gap:6px; opacity:0;
  transition:var(--transition);
}
.quote-card:hover .quote-actions { opacity:1; }
.quote-card .fav-btn {
  background:none; border:none; color:var(--text-muted); cursor:pointer;
  font-size:1.2rem; transition:var(--transition); padding:4px;
}
.quote-card .fav-btn.faved { color:var(--gold); }
.quote-card .copy-btn {
  background:none; border:none; color:var(--text-muted); cursor:pointer;
  font-size:0.9rem; transition:var(--transition); padding:4px;
}
.quote-card .copy-btn:hover, .quote-card .fav-btn:hover { color:var(--gold-light); }

/* Timeline */
.timeline-container {
  position:relative; overflow-x:auto; padding:30px 0 50px;
  cursor:grab;
}
.timeline-container:active { cursor:grabbing; }
.timeline-track {
  position:relative; height:280px; min-width:2800px;
  padding:0 60px;
}
.timeline-line {
  position:absolute; top:50%; left:60px; right:60px; height:2px;
  background:linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-dim));
}
.timeline-node {
  position:absolute; transform:translate(-50%, -50%);
  cursor:pointer; transition:var(--transition);
}
.timeline-node .dot {
  width:14px; height:14px; border-radius:50%; border:2px solid var(--gold);
  background:var(--bg-deep); transition:var(--transition);
  margin:0 auto;
}
.timeline-node:hover .dot { background:var(--gold); transform:scale(1.3); }
.timeline-node .label {
  position:absolute; font-size:0.7rem; color:var(--text-secondary);
  white-space:nowrap; text-align:center; width:100px; left:-50px;
}
.timeline-node.above .label { bottom:22px; }
.timeline-node.below .label { top:22px; }
.timeline-node .year {
  font-size:0.65rem; color:var(--text-muted);
  position:absolute; white-space:nowrap;
}
.timeline-node.above .year { bottom:6px; left:50%; transform:translateX(-50%); }
.timeline-node.below .year { top:6px; left:50%; transform:translateX(-50%); }
.timeline-era {
  position:absolute; top:50%; transform:translateY(-50%);
  font-size:0.7rem; color:var(--gold-dim); padding:4px 12px;
  border:1px dashed var(--gold-dim); border-radius:12px;
  white-space:nowrap; pointer-events:none;
}
.timeline-controls {
  display:flex; gap:8px; justify-content:center; margin-bottom:16px;
}

/* Detail panel */
.detail-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6);
  z-index:200; display:none; align-items:center; justify-content:center;
}
.detail-overlay.open { display:flex; }
.detail-panel {
  background:var(--bg-panel); border-radius:var(--radius-lg);
  max-width:560px; width:90%; max-height:80vh; overflow-y:auto;
  padding:32px; position:relative;
  border:1px solid rgba(255,255,255,0.08);
}
.detail-panel .close-btn {
  position:absolute; top:12px; right:12px;
  background:none; border:none; color:var(--text-muted); font-size:1.4rem;
  cursor:pointer; transition:var(--transition);
}
.detail-panel .close-btn:hover { color:var(--text-primary); }
.detail-panel h3 { font-family:var(--font-serif); color:var(--gold); margin-bottom:8px; }
.detail-panel .meta { font-size:0.85rem; color:var(--text-muted); margin-bottom:16px; }
.detail-panel .wiki-snippet {
  background:var(--bg-card); border-radius:var(--radius); padding:14px;
  margin-top:14px; font-size:0.85rem; color:var(--text-secondary);
  line-height:1.6;
}
.detail-panel .wiki-snippet.loading { color:var(--text-muted); }

/* Graph page */
.graph-layout { display:flex; gap:0; height:calc(100vh - 120px); }
#graph-container { flex:1; background:var(--bg-deep); border-radius:var(--radius-lg); overflow:hidden; position:relative; }
#graph-container svg { width:100%; height:100%; }
#graph-container .node { cursor:pointer; }
#graph-container .node circle { stroke-width:2px; transition:var(--transition); }
#graph-container .node:hover circle { stroke-width:3.5px; filter:brightness(1.3); }
#graph-container .link { stroke-opacity:0.3; stroke-width:1px; }
#graph-container .link.influence { stroke-dasharray:none; }
#graph-container .link.opposes { stroke-dasharray:5,3; }
#graph-container .link.complement { stroke-dasharray:2,4; }
#graph-container .link.inherits { stroke-dasharray:8,4; }
#graph-container text { font-size:11px; fill:var(--text-secondary); pointer-events:none; font-family:var(--font-sans); }

.graph-sidebar {
  width:280px; background:var(--bg-panel); border-radius:var(--radius-lg);
  padding:20px; overflow-y:auto; border:1px solid rgba(255,255,255,0.06);
}
.graph-sidebar h4 { color:var(--gold); margin-bottom:12px; font-family:var(--font-serif); font-size:0.95rem; }
.graph-sidebar .filter-group { margin-bottom:16px; }
.graph-sidebar .filter-group label {
  display:flex; align-items:center; gap:8px; font-size:0.8rem;
  color:var(--text-secondary); padding:4px 0; cursor:pointer;
}
.graph-sidebar .filter-group input[type=checkbox] { accent-color:var(--gold); }
.graph-sidebar .node-detail { font-size:0.82rem; color:var(--text-secondary); line-height:1.6; }
.graph-sidebar .node-detail h5 { color:var(--gold); font-size:0.9rem; margin-bottom:4px; }
.graph-path-control { margin-top:8px; }
.graph-path-control select {
  width:100%; background:var(--bg-card); color:var(--text-primary);
  border:1px solid rgba(255,255,255,0.08); padding:6px 10px;
  border-radius:var(--radius); font-family:inherit; font-size:0.8rem; margin-bottom:6px;
}

/* Quiz */
.quiz-container { max-width:600px; margin:40px auto; }
.quiz-progress {
  height:3px; background:var(--bg-card); border-radius:2px; margin-bottom:32px;
}
.quiz-progress-bar { height:100%; background:var(--gold); border-radius:2px; transition:width 0.4s ease; }
.quiz-question {
  font-family:var(--font-serif); font-size:1.3rem; margin-bottom:24px; color:var(--text-primary);
}
.quiz-options { display:flex; flex-direction:column; gap:10px; }
.quiz-option {
  background:var(--bg-card); border:1px solid rgba(255,255,255,0.06);
  border-radius:var(--radius); padding:16px 20px; cursor:pointer;
  transition:var(--transition); text-align:left; font-size:0.95rem;
  color:var(--text-secondary); font-family:inherit;
}
.quiz-option:hover { border-color:var(--gold-dim); color:var(--text-primary); background:var(--bg-hover); }
.quiz-option.selected { border-color:var(--gold); color:var(--gold-light); background:rgba(212,168,83,0.08); }
.quiz-result { text-align:center; }
.quiz-result h3 { font-family:var(--font-serif); color:var(--gold); font-size:1.5rem; margin-bottom:12px; }
.quiz-result .match-bar {
  height:8px; border-radius:4px; margin:8px 0 16px;
  background:linear-gradient(90deg, var(--gold), var(--gold-light));
  transition:width 1s ease;
}
.quiz-result .recommendations { text-align:left; margin-top:24px; }

/* Favorites */
.fav-empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
.fav-actions { display:flex; gap:10px; margin-bottom:20px; }

/* Toast */
.toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  background:var(--bg-panel); color:var(--gold-light);
  padding:10px 24px; border-radius:24px; font-size:0.85rem;
  z-index:999; opacity:0; transition:opacity 0.3s ease;
  border:1px solid var(--gold-dim); pointer-events:none;
}
.toast.show { opacity:1; }

/* Search overlay */
.search-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.75); z-index:300;
  display:none; align-items:flex-start; justify-content:center;
  padding-top:15vh;
}
.search-overlay.open { display:flex; }
.search-modal {
  background:var(--bg-panel); border-radius:var(--radius-lg);
  width:560px; max-width:90%; overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
}
.search-modal input {
  width:100%; background:transparent; border:none;
  color:var(--text-primary); font-size:1.1rem; padding:20px 24px;
  font-family:inherit; outline:none;
}
.search-modal input::placeholder { color:var(--text-muted); }
.search-results { max-height:400px; overflow-y:auto; }
.search-result-item {
  padding:14px 24px; cursor:pointer; transition:var(--transition);
  border-top:1px solid rgba(255,255,255,0.04);
  display:flex; align-items:center; gap:12px;
}
.search-result-item:hover { background:var(--bg-hover); }
.search-result-item .result-type {
  font-size:0.7rem; padding:2px 8px; border-radius:8px;
  background:var(--gold-dim); color:var(--gold-light); white-space:nowrap;
}
.search-result-item .result-text { font-size:0.9rem; flex:1; }
.search-result-item .result-sub { font-size:0.75rem; color:var(--text-muted); }

/* Responsive */
@media (max-width:768px) {
  .hero h1 { font-size:1.8rem; }
  .hero { padding:50px 16px 40px; }
  .quote-grid { grid-template-columns:1fr; }
  .dim-nav { grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); }
  .graph-layout { flex-direction:column; height:auto; }
  .graph-sidebar { width:100%; }
  #graph-container { height:400px; }
  .app-header nav { gap:10px; }
  .app-header nav a { font-size:0.75rem; }
  main { padding:16px; }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg-deep); }
::-webkit-scrollbar-thumb { background:var(--bg-hover); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--gold-dim); }
</style>
</head>
<body>
<div class="app-header">
  <div class="logo" onclick="navigate('/')">生命的意义</div>
  <nav id="main-nav">
    <a href="#/" class="active">首页</a>
    <a href="#/quotes">名言库</a>
    <a href="#/timeline">时间线</a>
    <a href="#/graph">关系图</a>
    <a href="#/quiz">你的意义</a>
    <a href="#/favorites">收藏</a>
  </nav>
  <button class="search-trigger" onclick="openSearch()" title="全局搜索">
    🔍 <span>搜索</span> <kbd>Ctrl+K</kbd>
  </button>
</div>

<main id="main-content"></main>

<div class="detail-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<div class="search-overlay" id="search-overlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-modal">
    <input type="text" id="search-input" placeholder="搜索名言、思想家、事件..." oninput="performSearch(this.value)">
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA
// ============================================================
const DIMENSIONS = {
  philosophy:     { id:'philosophy',     name:'哲学',   icon:'🏛️', color:'#d4a853' },
  religion:       { id:'religion',       name:'宗教与信仰', icon:'⛪', color:'#c0854a' },
  science:        { id:'science',        name:'科学',   icon:'🔬', color:'#5a8db6' },
  psychology:     { id:'psychology',     name:'心理学', icon:'🧠', color:'#8b6faa' },
  literature:     { id:'literature',     name:'文学与艺术', icon:'📖', color:'#c05757' },
  history:        { id:'history',        name:'历史与文化', icon:'📜', color:'#5a9e6f' },
  contemporary:   { id:'contemporary',   name:'当代观点', icon:'💡', color:'#4a9e9e' }
};

const DIM_COLORS = {
  philosophy:'#d4a853', religion:'#c0854a', science:'#5a8db6',
  psychology:'#8b6faa', literature:'#c05757', history:'#5a9e6f',
  contemporary:'#4a9e9e'
};

const quotes = [
  { id:'q1', text:"The unexamined life is not worth living.", textZh:"未经审视的人生不值得过。", author:"苏格拉底", source:"《申辩篇》", dimension:'philosophy', tags:['自我','反思'], year:-399 },
  { id:'q2', text:"He who has a why to live can bear almost any how.", textZh:"一个人知道自己为什么而活，就可以忍受任何一种生活。", author:"尼采", source:"《偶像的黄昏》", dimension:'philosophy', tags:['意义','苦难'], year:1889 },
  { id:'q3', text:"Man is condemned to be free.", textZh:"人注定是自由的。", author:"萨特", source:"《存在主义是一种人道主义》", dimension:'philosophy', tags:['自由','责任'], year:1946 },
  { id:'q4', text:"One must imagine Sisyphus happy.", textZh:"必须想象西西弗斯是幸福的。", author:"加缪", source:"《西西弗神话》", dimension:'philosophy', tags:['荒诞','幸福'], year:1942 },
  { id:'q5', text:"The meaning of life is that it stops.", textZh:"生命的意义就在于它会停止。", author:"卡夫卡", source:"随笔", dimension:'literature', tags:['死亡','有限'], year:1920 },
  { id:'q6', text:"道可道，非常道；名可名，非常名。", textZh:"The Tao that can be told is not the eternal Tao.", author:"老子", source:"《道德经》", dimension:'philosophy', tags:['道','不可言说'], year:-500 },
  { id:'q7', text:"己所不欲，勿施于人。", textZh:"Do not do to others what you would not have them do to you.", author:"孔子", source:"《论语》", dimension:'philosophy', tags:['仁','伦理'], year:-480 },
  { id:'q8', text:"What we achieve inwardly will change outer reality.", textZh:"我们内在的成就将改变外在的现实。", author:"普鲁塔克", source:"《希腊罗马名人传》", dimension:'history', tags:['内在','改变'], year:100 },
  { id:'q9', text:"In the depth of winter, I finally learned that within me there lay an invincible summer.", textZh:"在隆冬，我终于知道，我身上有一个不可战胜的夏天。", author:"加缪", source:"《重返蒂巴萨》", dimension:'literature', tags:['韧性','希望'], year:1952 },
  { id:'q10', text:"The only way to deal with an unfree world is to become so absolutely free that your very existence is an act of rebellion.", textZh:"应对不自由世界的唯一方式是变得如此自由，以至于你的存在本身就是一种反抗。", author:"加缪", source:"随笔", dimension:'philosophy', tags:['自由','反抗'], year:1951 },
  { id:'q11', text:"Life is not a problem to be solved, but a reality to be experienced.", textZh:"生命不是一个需要解决的问题，而是一个需要体验的现实。", author:"克尔凯郭尔", source:"日记", dimension:'philosophy', tags:['体验','存在'], year:1843 },
  { id:'q12', text:"The purpose of life is not to be happy. It is to be useful, to be honorable, to be compassionate.", textZh:"生命的目的不是快乐，而是有用、可敬、富有同情心。", author:"爱默生", source:"随笔集", dimension:'philosophy', tags:['目的','美德'], year:1850 },
  { id:'q13', text:"Everything can be taken from a man but one thing: the last of the human freedoms—to choose one's attitude.", textZh:"人可以被剥夺一切，除了最后一项自由：选择自己态度的自由。", author:"维克多·弗兰克尔", source:"《活出生命的意义》", dimension:'psychology', tags:['态度','自由'], year:1946 },
  { id:'q14', text:"What is to give light must endure burning.", textZh:"要发光，必先承受燃烧。", author:"维克多·弗兰克尔", source:"《活出生命的意义》", dimension:'psychology', tags:['苦难','成长'], year:1946 },
  { id:'q15', text:"The cosmos is within us. We are made of star-stuff. We are a way for the universe to know itself.", textZh:"宇宙在我们之中。我们由星辰物质构成。我们是宇宙认识自身的一种方式。", author:"卡尔·萨根", source:"《宇宙》", dimension:'science', tags:['宇宙','意识'], year:1980 },
  { id:'q16', text:"We are just an advanced breed of monkeys on a minor planet of a very average star. But we can understand the Universe. That makes us something very special.", textZh:"我们只是普通恒星的微小行星上的一种高级猴子。但我们能理解宇宙，这使我们非常特别。", author:"斯蒂芬·霍金", source:"采访", dimension:'science', tags:['宇宙','人类'], year:1990 },
  { id:'q17', text:"The mystery of human existence lies not in just staying alive, but in finding something to live for.", textZh:"人类存在的奥秘不在于仅仅活着，而在于找到活着的理由。", author:"陀思妥耶夫斯基", source:"《卡拉马佐夫兄弟》", dimension:'literature', tags:['存在','目的'], year:1880 },
  { id:'q18', text:"The two most important days in your life are the day you are born and the day you find out why.", textZh:"生命中最重要的两天，是你出生的那天，和你找到为何而生的那天。", author:"马克·吐温", source:"随笔", dimension:'literature', tags:['出生','目的'], year:1890 },
  { id:'q19', text:"The meaning of life is to give life meaning.", textZh:"生命的意义在于赋予生命意义。", author:"弗兰克尔", source:"演讲", dimension:'psychology', tags:['意义','创造'], year:1960 },
  { id:'q20', text:"You will never be happy if you continue to search for what happiness consists of. You will never live if you are looking for the meaning of life.", textZh:"如果你继续寻找幸福由什么构成，你永远不会幸福。如果你正在寻找生命的意义，你永远不会真正活着。", author:"加缪", source:"随笔", dimension:'philosophy', tags:['幸福','行动'], year:1945 },
  { id:'q21', text:"The privilege of a lifetime is to become who you truly are.", textZh:"一生的特权是成为你真正的自己。", author:"荣格", source:"《回忆·梦·思考》", dimension:'psychology', tags:['自我','真实'], year:1961 },
  { id:'q22', text:"Knowing others is intelligence; knowing yourself is true wisdom. Mastering others is strength; mastering yourself is true power.", textZh:"知人者智，自知者明。胜人者有力，自胜者强。", author:"老子", source:"《道德经》", dimension:'philosophy', tags:['自知','智慧'], year:-500 },
  { id:'q23', text:"God is dead. God remains dead. And we have killed him.", textZh:"上帝已死。上帝仍然死了。我们杀死了他。", author:"尼采", source:"《快乐的科学》", dimension:'philosophy', tags:['信仰','现代性'], year:1882 },
  { id:'q24', text:"Love the life you live. Live the life you love.", textZh:"爱你所过的生活，过你所爱的生活。", author:"鲍勃·马利", source:"歌词", dimension:'contemporary', tags:['爱','生活'], year:1975 },
  { id:'q25', text:"The only true wisdom is in knowing you know nothing.", textZh:"唯一真正的智慧是知道自己一无所知。", author:"苏格拉底", source:"柏拉图《申辩篇》", dimension:'philosophy', tags:['智慧','谦卑'], year:-399 },
  { id:'q26', text:"Life is really simple, but we insist on making it complicated.", textZh:"生活其实很简单，但我们坚持把它搞复杂。", author:"孔子", source:"《论语》", dimension:'philosophy', tags:['简单','生活'], year:-480 },
  { id:'q27', text:"Peace comes from within. Do not seek it without.", textZh:"平静来自内心。不要向外寻求。", author:"佛陀", source:"法句经", dimension:'religion', tags:['平静','内省'], year:-450 },
  { id:'q28', text:"We are what we repeatedly do. Excellence, then, is not an act, but a habit.", textZh:"我们是由重复的行为所塑造的。因此，卓越不是一种行为，而是一种习惯。", author:"亚里士多德", source:"《尼各马可伦理学》", dimension:'philosophy', tags:['习惯','卓越'], year:-340 },
  { id:'q29', text:"Science without religion is lame, religion without science is blind.", textZh:"没有宗教的科学是跛脚的，没有科学的宗教是盲目的。", author:"爱因斯坦", source:"论文", dimension:'science', tags:['科学','宗教'], year:1940 },
  { id:'q30', text:"The good life is one inspired by love and guided by knowledge.", textZh:"美好的生活由爱启发，由知识引导。", author:"罗素", source:"《我为什么而活》", dimension:'philosophy', tags:['爱','知识'], year:1950 },
  { id:'q31', text:"Happiness is not something ready made. It comes from your own actions.", textZh:"幸福不是现成的东西。它来自你的行动。", author:"达赖喇嘛", source:"演讲", dimension:'religion', tags:['幸福','行动'], year:2000 },
  { id:'q32', text:"In three words I can sum up everything I've learned about life: it goes on.", textZh:"用三个词总结我对生命的所有认识：它继续。", author:"罗伯特·弗罗斯特", source:"诗歌", dimension:'literature', tags:['坚韧','继续'], year:1940 },
  { id:'q33', text:"The cave you fear to enter holds the treasure you seek.", textZh:"你害怕进入的洞穴，藏着你寻找的宝藏。", author:"约瑟夫·坎贝尔", source:"《千面英雄》", dimension:'psychology', tags:['恐惧','成长'], year:1949 },
  { id:'q34', text:"You must be the change you wish to see in the world.", textZh:"你必须成为你想在世界上看到的变化。", author:"甘地", source:"演讲", dimension:'history', tags:['改变','行动'], year:1930 },
  { id:'q35', text:"The best way to find yourself is to lose yourself in the service of others.", textZh:"找到自己最好的方式，是在服务他人中忘记自己。", author:"甘地", source:"演讲", dimension:'history', tags:['服务','自我'], year:1935 },
  { id:'q36', text:"Be kind whenever possible. It is always possible.", textZh:"只要有可能，就要善良。而善良总是可能的。", author:"达赖喇嘛", source:"演讲", dimension:'religion', tags:['善良','可能'], year:2005 },
  { id:'q37', text:"I think therefore I am.", textZh:"我思故我在。", author:"笛卡尔", source:"《第一哲学沉思集》", dimension:'philosophy', tags:['思考','存在'], year:1641 },
  { id:'q38', text:"The unexamined belief is not worth believing.", textZh:"未经审视的信念不值得相信。", author:"佚名", source:"现代格言", dimension:'contemporary', tags:['信念','审视'], year:2000 },
  { id:'q39', text:"Do not dwell in the past, do not dream of the future, concentrate the mind on the present moment.", textZh:"不要沉湎于过去，不要梦想未来，专注于当下。", author:"佛陀", source:"法句经", dimension:'religion', tags:['当下','专注'], year:-450 },
  { id:'q40', text:"The meaning of life is to find your gift. The purpose of life is to give it away.", textZh:"生命的意义是找到你的天赋。生命的目的就是把它奉献出去。", author:"毕加索", source:"访谈", dimension:'literature', tags:['天赋','奉献'], year:1950 }
];

  { id:'t1', year:-800, title:'轴心时代开启', description:'世界各地几乎同时出现伟大的思想家：中国的老子与孔子、印度的佛陀、希腊的苏格拉底，人类首次系统性地追问生命的意义。', dimension:'history', relatedThinkers:['laozi','confucius','buddha','socrates'] },

  { id:'t7', year:400, title:'奥古斯丁《忏悔录》', description:'从神学角度阐释人生目的：人类的心永远不安，直到在上帝那里找到安息。', dimension:'religion', relatedThinkers:['augustine'] },

  { id:'t9', year:1641, title:'笛卡尔提出"我思故我在"', description:'以怀疑一切为起点，确立自我意识为确定性基础，开启近代哲学。', dimension:'philosophy', relatedThinkers:['descartes'] },
  { id:'t10', year:1781, title:'康德《纯粹理性批判》', description:'限定理性范围，为信仰留出空间。提出"人为自然立法"，强调道德自律。', dimension:'philosophy', relatedThinkers:['kant'] },

  { id:'t12', year:1859, title:'达尔文《物种起源》', description:'进化论彻底改变了人类对自身起源和地位的理解，挑战传统的生命目的论。', dimension:'science', relatedThinkers:['darwin'] },

function navigate(path) {
  if (path === currentPage) return;
  currentPage = path;
  window.location.hash = '#' + path;
  render(path);
}

function render(path) {
  const main = document.getElementById('main-content');
  const navLinks = document.querySelectorAll('#main-nav a');
  navLinks.forEach(a => a.classList.remove('active'));
  const activeLink = document.querySelector(`#main-nav a[href="#${path}"]`);
  if (activeLink) activeLink.classList.add('active');

  // Hide all pages
  document.querySelectorAll('.page').forEach(p => { if(p.parentNode===main) p.remove(); });

  switch(path) {
    case '/': renderHome(main); break;
    case '/quotes': renderQuotesPage(main); break;
    case '/timeline': renderTimelinePage(main); break;
    case '/graph': renderGraphPage(main); break;
    case '/quiz': renderQuizPage(main); break;
    case '/favorites': renderFavoritesPage(main); break;
    case '/about': renderAboutPage(main); break;
    default:
      if (path.startsWith('/explore/')) {
        const dim = path.replace('/explore/', '');
        renderExplorePage(main, dim);
      } else {
        navigate('/');
      }
  }
}

window.addEventListener('hashchange', () => {
  const path = window.location.hash.slice(1) || '/';
  if (path !== currentPage) {
    currentPage = path;
    render(path);
  }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
}

function formatYear(y) {
  if (y < 0) return `公元前 ${Math.abs(y)} 年`;
  return `${y} 年`;
}

function getQuoteById(id) { return quotes.find(q => q.id === id); }
function getThinkerById(id) { return thinkers.find(t => t.id === id); }

function getThinkersByDimension(dim) { return thinkers.filter(t => t.dimension === dim); }

function renderQuoteCard(q, container, showActions = true) {
  const isFaved = favorites.includes(q.id);
  container.innerHTML = `
    <div class="quote-text">${escapeHtml(q.text)}</div>
    ${q.textZh ? `<div class="quote-translation">${escapeHtml(q.textZh)}</div>` : ''}
    <div class="quote-meta">
      <strong>${escapeHtml(q.author)}</strong> · ${escapeHtml(q.source)} · ${formatYear(q.year)}
    </div>
    <span class="quote-dim">${DIMENSIONS[q.dimension]?.icon || ''} ${DIMENSIONS[q.dimension]?.name || q.dimension}</span>
    ${showActions ? `
    <div class="quote-actions">
      <button class="fav-btn ${isFaved?'faved':''}" onclick="event.stopPropagation();toggleFav('${q.id}',this)" title="收藏">${isFaved?'★':'☆'}</button>
      <button class="copy-btn" onclick="event.stopPropagation();copyQuote('${q.id}')" title="复制">📋</button>
    </div>` : ''}
  `;
  if (showActions) {
    container.style.cursor = 'pointer';
    container.onclick = () => openDetail('quote', q);
  }
}

function toggleFav(id, btn) {
  const idx = favorites.indexOf(id);
  if (idx >= 0) { favorites.splice(idx,1); btn.classList.remove('faved'); btn.textContent='☆'; showToast('已取消收藏'); }
  else { favorites.push(id); btn.classList.add('faved'); btn.textContent='★'; showToast('已添加收藏'); }
  localStorage.setItem('lof-favs', JSON.stringify(favorites));
}

function copyQuote(id) {
  const q = getQuoteById(id);
  const text = `"${q.text}" — ${q.author}${q.textZh ? '\\n' + q.textZh : ''}`;
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
}

function filterQuotes() {
  const searchTerm = (document.getElementById('quote-search')?.value || '').toLowerCase();
  const activeChip = document.querySelector('#quote-filter-chips .chip.active');
  const dimFilter = activeChip ? activeChip.dataset.dim : 'all';

  const filtered = quotes.filter(q => {
    if (dimFilter !== 'all' && q.dimension !== dimFilter) return false;
    if (searchTerm) {
      const haystack = (q.text + q.textZh + q.author + q.source + q.tags.join(' ')).toLowerCase();
      if (!haystack.includes(searchTerm)) return false;
    }
    return true;
  });

  const grid = document.getElementById('quote-grid');
  const empty = document.getElementById('quote-empty');
  if (!grid) return;
  grid.innerHTML = '';
  if (filtered.length === 0) {
    if (empty) empty.style.display = 'block';
    return;
  }
  if (empty) empty.style.display = 'none';
  filtered.forEach(q => {
    const card = document.createElement('div');
    card.className = 'quote-card';
    renderQuoteCard(q, card);
    grid.appendChild(card);
  });
}

function renderForceGraph() {
  const container = document.getElementById('graph-container');
  if (!container) return;
  const w = container.clientWidth || 800;
  const h = 500;

  // Get visible dimensions
  const visibleDims = new Set();
  document.querySelectorAll('#graph-filters input:checked').forEach(cb => visibleDims.add(cb.dataset.dim));

  const filteredThinkers = thinkers.filter(t => visibleDims.has(t.dimension));
  const thinkerIds = new Set(filteredThinkers.map(t => t.id));

  // Build links
  const links = [];
  filteredThinkers.forEach(t => {
    t.influences.forEach(targetId => {
      if (thinkerIds.has(targetId)) links.push({ source:t.id, target:targetId, type:'influences' });
    });
    t.opposes.forEach(targetId => {
      if (thinkerIds.has(targetId)) links.push({ source:t.id, target:targetId, type:'opposes' });
    });
  });

  // Color scale
  const colorScale = d3.scaleOrdinal()
    .domain(Object.keys(DIMENSIONS))
    .range(Object.values(DIM_COLORS));

  container.innerHTML = '';
  const svg = d3.select('#graph-container')
    .append('svg')
    .attr('viewBox', [0, 0, w, h])
    .attr('width', w)
    .attr('height', h);

  // Zoom
  const g = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', (event) => {
    g.attr('transform', event.transform);
  }));

  // Arrow marker
  svg.append('defs').selectAll('marker')
    .data(['arrow'])
    .join('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 28)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('fill', '#888')
    .attr('d', 'M0,-5L10,0L0,5');

  // Simulation
  const simulation = d3.forceSimulation(filteredThinkers)
    .force('link', d3.forceLink(links).id(d => d.id).distance(120))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(w / 2, h / 2))
    .force('collision', d3.forceCollide(30));

  graphSimulation = simulation;

  // Draw links
  const link = g.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('class', d => 'link ' + d.type)
    .attr('stroke', '#888')
    .attr('marker-end', 'url(#arrow)');

  // Draw nodes
  const node = g.append('g')
    .selectAll('g')
    .data(filteredThinkers)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', dragstarted)
      .on('drag', dragged)
      .on('end', dragended));

  node.append('circle')
    .attr('r', d => d.dimension === 'philosophy' ? 18 : 14)
    .attr('fill', d => colorScale(d.dimension))
    .attr('stroke', '#fff')
    .attr('stroke-opacity', 0.3);

  node.append('text')
    .text(d => d.nameZh)
    .attr('x', 22)
    .attr('y', 4)
    .attr('font-size', '10px')
    .attr('fill', '#8899aa');

  node.on('click', (event, d) => {
    event.stopPropagation();
    selectGraphNode(d);
  });

  svg.on('click', () => {
    selectGraphNode(null);
  });

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragged(event, d) {
    d.fx = event.x; d.fy = event.y;
  }
  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
  }
}

function updateGraphPath() {
  const source = document.getElementById('graph-path-source')?.value;
  const target = document.getElementById('graph-path-target')?.value;
  if (!source || !target) return;
  highlightPath(source, target);
}

function highlightPath(sourceId, targetId) {
  if (!graphSimulation) return;
  // BFS shortest path on thinker influence graph
  const visited = new Set();
  const parent = {};
  const queue = [sourceId];
  visited.add(sourceId);
  while (queue.length > 0) {
    const cur = queue.shift();
    if (cur === targetId) break;
    const thinker = getThinkerById(cur);
    if (!thinker) continue;
    const neighbors = [...(thinker.influences || []), ...(thinker.opposes || [])];
    thinkers.filter(t => t.influences?.includes(cur) || t.opposes?.includes(cur)).forEach(t => {
      if (!neighbors.includes(t.id)) neighbors.push(t.id);
    });
    neighbors.forEach(nid => {
      if (!visited.has(nid)) {
        visited.add(nid);
        parent[nid] = cur;
        queue.push(nid);
      }
    });
  }

  const path = [];
  let node = targetId;
  while (node) {
    path.unshift(node);
    node = parent[node];
  }
  const pathSet = new Set(path);

  // Update visual highlighting
  d3.select('#graph-container').selectAll('.node circle')
    .attr('stroke', d => pathSet.has(d.id) ? '#d4a853' : '#fff')
    .attr('stroke-width', d => pathSet.has(d.id) ? 3 : 1)
    .attr('stroke-opacity', d => pathSet.has(d.id) ? 1 : 0.3);

  d3.select('#graph-container').selectAll('.link')
    .attr('stroke', d => (pathSet.has(d.source.id) && pathSet.has(d.target.id)) ? '#d4a853' : '#888')
    .attr('stroke-opacity', d => (pathSet.has(d.source.id) && pathSet.has(d.target.id)) ? 0.8 : 0.3)
    .attr('stroke-width', d => (pathSet.has(d.source.id) && pathSet.has(d.target.id)) ? 2.5 : 1);

  showToast(`溯源路径: ${path.map(id => getThinkerById(id)?.nameZh || id).join(' → ')}`);
}

function clearGraphPath() {
  d3.select('#graph-container').selectAll('.node circle')
    .attr('stroke', '#fff')
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.3);
  d3.select('#graph-container').selectAll('.link')

  document.getElementById('graph-path-source').value = '';
  document.getElementById('graph-path-target').value = '';
}

function renderQuizQuestion() {
  const container = document.getElementById('quiz-container');
  if (!container) return;
  if (quizState.current >= quizQuestions.length) {
    finishQuiz();
    return;
  }
  const q = quizQuestions[quizState.current];
  const progress = ((quizState.current) / quizQuestions.length) * 100;
  container.innerHTML = `
    <div class="quiz-progress"><div class="quiz-progress-bar" style="width:${progress}%;"></div></div>
    <div class="quiz-question">${quizState.current + 1}. ${escapeHtml(q.question)}</div>
    <div class="quiz-options">
      ${q.options.map((o,i) => `
        <button class="quiz-option" onclick="selectQuizOption(${i})">${escapeHtml(o.text)}</button>
      `).join('')}
    </div>
  `;
}

function selectQuizOption(idx) {
  const q = quizQuestions[quizState.current];
  const option = q.options[idx];
  Object.keys(option.weights).forEach(dim => {
    quizState.scores[dim] = (quizState.scores[dim] || 0) + option.weights[dim];
  });
  quizState.current++;
  renderQuizQuestion();
}

function finishQuiz() {
  const sorted = Object.entries(quizState.scores).sort((a,b) => b[1] - a[1]);
  const top = sorted[0];
  const top3 = sorted.slice(0, 3);
  const maxScore = top[1];

  quizResult = { top: top[0], top3: top3.map(s => ({dim:s[0], score:s[1]})), date: new Date().toISOString() };
  localStorage.setItem('lof-quiz', JSON.stringify(quizResult));

  const main = document.getElementById('main-content');
  showQuizResult(main);
}

function showQuizResult(main) {
  if (!quizResult) { renderQuizPage(main); return; }
  const topDim = DIMENSIONS[quizResult.top];
  const maxScore = quizResult.top3[0].score;

  // Build personalized recommendations: allocate 5 slots across top-3 dimensions
  // proportionally to their scores, then pick different quotes each time (seeded by score).
  const totalScore = quizResult.top3.reduce((sum, s) => sum + s.score, 0);
  const allocations = quizResult.top3.map(s => ({
    dim: s.dim,
    score: s.score,
    count: Math.max(1, Math.round((s.score / totalScore) * 5))
  }));
  // Adjust so total = 5
  let diff = 5 - allocations.reduce((s, a) => s + a.count, 0);
  for (let i = 0; diff > 0 && i < allocations.length; i++) { allocations[i].count++; diff--; }
  for (let i = allocations.length - 1; diff < 0 && i >= 0; i--) { if (allocations[i].count > 1) { allocations[i].count--; diff++; } }

  const dimQuotes = [];
  allocations.forEach(a => {
    const pool = getQuotesByDimension(a.dim);
    // Deterministic shuffle seeded by the dimension score so same score = same picks
    const seed = quizResult.top3.find(s => s.dim === a.dim).score;
    const shuffled = [...pool].sort((a, b) => {
      const ha = hashStr(a.id + seed);
      const hb = hashStr(b.id + seed);
      return ha - hb;
    });
    dimQuotes.push(...shuffled.slice(0, a.count));
  });

  function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
    return h;
  }

  main.innerHTML = `
    <div class="page active">
      <div class="section-title">💭 你的生命意义观</div>
      <div class="quiz-result">
        <div style="font-size:3rem;margin-bottom:8px;">${topDim?.icon || '🌟'}</div>
        <h3>你与<strong style="color:${topDim?.color || 'var(--gold)'};">${topDim?.name || quizResult.top}</strong>视角最为接近</h3>
        <div class="match-bar" style="width:${Math.round((maxScore / (quizQuestions.length * 3)) * 100)}%;max-width:300px;margin:16px auto;"></div>
        <p style="color:var(--text-secondary);max-width:500px;margin:0 auto;">${getDimensionIntro(quizResult.top)}</p>
        <div style="margin-top:24px;text-align:left;">
          <h4 style="color:var(--gold);margin-bottom:12px;">得分分布</h4>
          ${quizResult.top3.map((s,i) => {
            const d = DIMENSIONS[s.dim];
            const pct = Math.round((s.score / (quizQuestions.length * 3)) * 100);
            return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
              <span style="width:80px;font-size:0.85rem;">${d?.icon || ''} ${d?.name || s.dim}</span>
              <div style="flex:1;height:6px;background:var(--bg-card);border-radius:3px;">
                <div style="height:100%;width:${pct}%;background:${d?.color || 'var(--gold)'};border-radius:3px;"></div>
              </div>
              <span style="font-size:0.8rem;color:var(--text-muted);width:30px;">${pct}%</span>
            </div>`;
          }).join('')}
        </div>
        ${dimQuotes.length ? `
        <div class="recommendations">
          <h4 style="color:var(--gold);margin-bottom:12px;">推荐名言</h4>
          ${dimQuotes.map(q => `
            <div class="quote-card" style="margin-bottom:10px;">
              <div class="quote-text" style="font-size:0.9rem;">${escapeHtml(q.text)}</div>
              ${q.textZh ? `<div class="quote-translation" style="font-size:0.8rem;">${escapeHtml(q.textZh)}</div>` : ''}
              <div class="quote-meta" style="font-size:0.75rem;">— ${escapeHtml(q.author)}</div>
            </div>
          `).join('')}
        </div>` : ''}
        <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;">
          <button class="btn btn-primary" onclick="exploreDimension('${quizResult.top}')">深入了解 ${topDim?.name || ''}</button>
          <button class="btn btn-outline" onclick="retakeQuiz()">重新测试</button>
        </div>
      </div>
    </div>
  `;
}

const wikiCache = {};
async function fetchWikipedia(title, snippetId) {
  const targetEl = document.getElementById('wiki-snippet-' + (snippetId || title.replace(/[^a-zA-Z]/g,'')));
  if (!targetEl) return;

  if (wikiCache[title]) {
    targetEl.style.display = 'block';
    targetEl.innerHTML = wikiCache[title];
    targetEl.classList.remove('loading');
    return;
  }

  targetEl.style.display = 'block';
  targetEl.classList.add('loading');
  targetEl.textContent = '正在获取 Wikipedia 摘要...';

  try {
    const resp = await fetch(`https://zh.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
    if (!resp.ok) throw new Error('Not found');
    const data = await resp.json();
    const html = `
      <strong>Wikipedia 摘要：</strong>
      <p style="margin-top:6px;">${escapeHtml(data.extract?.substring(0, 500) || '暂无摘要')}...</p>
      ${data.content_urls?.desktop?.page ? `<a href="${data.content_urls.desktop.page}" target="_blank" style="font-size:0.8rem;">在 Wikipedia 阅读全文 →</a>` : ''}
    `;
    wikiCache[title] = html;
    targetEl.innerHTML = html;
    targetEl.classList.remove('loading');
  } catch(e) {
    targetEl.innerHTML = '<span style="color:var(--text-muted);">暂无 Wikipedia 条目（或网络不可用）</span>';
    targetEl.classList.remove('loading');
  }
}

// ============================================================
// GLOBAL SEARCH
// ============================================================
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
  setTimeout(() => document.getElementById('search-input').focus(), 100);
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
}

function performSearch(query) {
  const results = document.getElementById('search-results');
  if (!query || query.length < 1) {
    results.innerHTML = '';
    return;
  }
  const q = query.toLowerCase();

  const matchedQuotes = quotes.filter(item =>
    item.text.toLowerCase().includes(q) || item.textZh.toLowerCase().includes(q) ||
    item.author.toLowerCase().includes(q) || item.tags.some(t => t.includes(q))
  ).slice(0, 5);

  const matchedThinkers = thinkers.filter(item =>
    item.name.toLowerCase().includes(q) || item.nameZh.includes(q) ||
    item.keyIdeas.some(k => k.includes(q)) || item.region?.includes(q)
  ).slice(0, 5);

  const matchedEvents = timelineEvents.filter(item =>
    item.title.toLowerCase().includes(q) || item.title.includes(q) ||
    item.description.includes(q)
  ).slice(0, 5);

  let html = '';
  if (matchedQuotes.length) {
    html += `<div style="padding:8px 24px;font-size:0.75rem;color:var(--text-muted);">名言 (${matchedQuotes.length})</div>`;
    matchedQuotes.forEach(item => {
      html += `<div class="search-result-item" onclick="closeSearch();navigate('/quotes');setTimeout(()=>openDetail('quote',getQuoteById('${item.id}')),300)">
        <span class="result-type">名言</span>
        <span class="result-text">"${escapeHtml(item.text.substring(0, 60))}..."</span>
        <span class="result-sub">${escapeHtml(item.author)}</span>
      </div>`;
    });
  }
  if (matchedThinkers.length) {
    html += `<div style="padding:8px 24px;font-size:0.75rem;color:var(--text-muted);">思想家 (${matchedThinkers.length})</div>`;
    matchedThinkers.forEach(item => {
      html += `<div class="search-result-item" onclick="closeSearch();navigate('/graph');setTimeout(()=>openDetail('thinker','${item.id}'),500)">
        <span class="result-type">人物</span>
        <span class="result-text">${escapeHtml(item.nameZh)} (${escapeHtml(item.name)})</span>
        <span class="result-sub">${DIMENSIONS[item.dimension]?.name || item.dimension}</span>
      </div>`;
    });
  }
  if (matchedEvents.length) {
    html += `<div style="padding:8px 24px;font-size:0.75rem;color:var(--text-muted);">时间线事件 (${matchedEvents.length})</div>`;
    matchedEvents.forEach(item => {
      html += `<div class="search-result-item" onclick="closeSearch();navigate('/timeline');setTimeout(()=>openDetail('timeline',timelineEvents.find(e=>e.id==='${item.id}')),500)">
        <span class="result-type">事件</span>
        <span class="result-text">${escapeHtml(item.title)}</span>
        <span class="result-sub">${formatYear(item.year)}</span>
      </div>`;
    });
  }
  if (!html) {
    html = `<div style="padding:24px;text-align:center;color:var(--text-muted);">未找到相关结果</div>`;
  }
  results.innerHTML = html;
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    openSearch();
  }
  if (e.key === 'Escape') {
    closeSearch();
    closeDetail();
  }
});
